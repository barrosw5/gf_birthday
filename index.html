<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Love</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Raleway:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. VARIÁVEIS E BASE
           ========================================= */
        :root {
            --primary-neon: #ff6b81;
            --secondary-neon: #a29bfe;
            --bg-color: #050505;
        }

        body {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--bg-color); font-family: 'Raleway', sans-serif;
            position: relative;
        }

        /* =========================================
           2. CARTÃO DE MENSAGEM
           ========================================= */
        .card {
            background: rgba(10, 10, 10, 0.75);
            width: 85%; max-width: 450px; padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 107, 129, 0.15), inset 0 0 10px rgba(255, 255, 255, 0.05);
            text-align: center; backdrop-filter: blur(10px); z-index: 20;
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0; transition: opacity 2s ease-in-out;
        }

        h1 {
            font-family: 'Great Vibes', cursive; color: var(--primary-neon);
            text-shadow: 0 0 15px var(--primary-neon); font-size: 3.5rem;
            margin: 0 0 1rem 0; font-weight: normal; line-height: 1.2;
        }

        p {
            color: #ecf0f1; font-size: 1.1rem; margin-bottom: 1.5rem;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.2); font-weight: 300;
        }

        .highlight { font-weight: 600; color: var(--secondary-neon); text-shadow: 0 0 10px var(--secondary-neon); }

        .gift-btn {
            background: transparent; border: 1px solid var(--primary-neon);
            color: var(--primary-neon); padding: 10px 25px; font-family: 'Raleway', sans-serif;
            font-size: 1rem; border-radius: 50px; cursor: pointer; transition: all 0.5s ease;
            box-shadow: 0 0 10px var(--primary-neon); margin-top: 10px;
        }
        .gift-btn:hover { background: var(--primary-neon); color: white; box-shadow: 0 0 25px var(--primary-neon); }

        /* =========================================
           3. GALERIA (APARIÇÃO LENTA)
           ========================================= */
        .gallery-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 15;
            opacity: 0; 
            display: none;
        }

        .gallery-wrapper.visible {
            display: block;
            animation: slowFadeIn 5s ease-in-out forwards;
        }

        @keyframes slowFadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }

        /* =========================================
           4. FOTOS POLAROID (AJUSTADO PARA SER MAIOR E BEM ENQUADRADO)
           ========================================= */
        
        /* --- Versão PC --- */
        .scroll-img {
            width: 100%;       
            height: auto;      /* IMPORTANTE: A altura ajusta-se à foto, a moldura cola na imagem */
            display: block;    
            
            /* Moldura Polaroid PC */
            border: 15px solid white; /* Mais grosso */
            border-bottom: 50px solid white; /* Base da Polaroid */
            background-color: white; 
            box-sizing: border-box; /* Garante que a borda conta para o tamanho total */
            
            margin-bottom: 60px; /* Mais espaço entre fotos */
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6); 
            opacity: 0.95;
        }
        
        .scroll-img:nth-child(odd) { transform: rotate(-3deg); }
        .scroll-img:nth-child(even) { transform: rotate(2deg); }

        /* Layout PC - Colunas mais largas */
        .pc-columns { 
            display: flex; justify-content: space-between; 
            width: 100%; height: 100%; 
            padding: 0 2%; /* Menos padding lateral para aproveitar o espaço */
            box-sizing: border-box; 
        }
        
        .col-container { 
            width: 300px; /* AUMENTADO: Fotos maiores no PC */
            height: 100%; overflow: hidden; position: relative; 
        }
        .scroller-vertical { display: flex; flex-direction: column; }
        
        /* --- Versão Mobile --- */
        .mobile-row { 
            display: none; 
            position: absolute; top: 2%; left: 0; 
            width: 100%; 
            height: 280px; /* AUMENTADO: Faixa maior no telemóvel */
            overflow: hidden; white-space: nowrap; 
        }
        .scroller-horizontal { display: inline-flex; height: 100%; align-items: center; animation: scrollLeft 90s linear infinite; }
        
        .scroll-img-h {
            height: 240px; /* AUMENTADO: Fotos maiores no mobile */
            width: auto;   /* Largura automática para não deformar */
            
            /* Moldura Polaroid Mobile */
            border: 10px solid white; 
            border-bottom: 40px solid white;
            background-color: white; 
            box-sizing: border-box;
            
            margin-right: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }
        .scroll-img-h:nth-child(odd) { transform: rotate(-2deg); }
        .scroll-img-h:nth-child(even) { transform: rotate(1.5deg); }

        /* Keyframes */
        .scroll-up { animation: scrollUp 200s linear infinite; }
        .scroll-down { animation: scrollDown 200s linear infinite; }
        @keyframes scrollUp { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        @keyframes scrollDown { 0% { transform: translateY(-50%); } 100% { transform: translateY(0); } }
        @keyframes scrollLeft { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* =========================================
           5. JARDIM
           ========================================= */
        #garden-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        .flower-wrapper { position: absolute; bottom: -5px; display: flex; flex-direction: column; align-items: center; transform-origin: bottom center; }
        .stem { width: 4px; background: linear-gradient(to top, #004d00, #00ff00); box-shadow: 0 0 6px rgba(0, 255, 0, 0.4); border-radius: 99px; transform: scaleY(0); transform-origin: bottom center; animation: grow-stem linear forwards; }
        .flower-head { width: 45px; height: 45px; transform: scale(0); transform-origin: bottom center; z-index: 2; animation: bloom-flower cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes grow-stem { 0% { transform: scaleY(0); } 100% { transform: scaleY(1); } }
        @keyframes bloom-flower { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        .fill-red { fill: #ff2e63; filter: drop-shadow(0 0 8px #ff2e63); }
        .fill-pink { fill: #ff79cd; filter: drop-shadow(0 0 8px #ff79cd); }
        .fill-purple { fill: #be2edd; filter: drop-shadow(0 0 8px #be2edd); }
        .fill-yellow { fill: #f1c40f; filter: drop-shadow(0 0 8px #f1c40f); }
        .fill-white { fill: #ffffff; filter: drop-shadow(0 0 8px #ffffff); }

        /* =========================================
           6. RESPONSIVIDADE
           ========================================= */
        @media (max-width: 800px) {
            .pc-columns { display: none; }
            .mobile-row { display: block; }
            
            .card {
                margin: 0; 
                width: 90%;
            }
            
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div id="garden-container"></div>

    <div id="gallery-wrapper" class="gallery-wrapper">
        <div class="pc-columns">
            <div class="col-container"><div class="scroller-vertical scroll-down" id="col-left"></div></div>
            <div class="col-container"><div class="scroller-vertical scroll-up" id="col-right"></div></div>
        </div>
        <div class="mobile-row"><div class="scroller-horizontal" id="row-top"></div></div>
    </div>

    <div class="card" id="content"></div>

    <script>
        const birthDate = new Date('2009-01-26T00:00:00'); 
        const today = new Date();
        
        // As tuas fotos
        const photos = [
            'https://res.cloudinary.com/dhvqxlksv/image/upload/v1769295640/WhatsApp_Image_2026-01-24_at_22.56.27_2_s57tph.jpg',
            'https://res.cloudinary.com/dhvqxlksv/image/upload/v1769295639/WhatsApp_Image_2026-01-24_at_22.56.28_3_kw3r1i.jpg',
            'https://res.cloudinary.com/dhvqxlksv/image/upload/v1769295639/WhatsApp_Image_2026-01-24_at_22.56.28_2_q3gptf.jpg',
            'https://res.cloudinary.com/dhvqxlksv/image/upload/v1769295639/WhatsApp_Image_2026-01-24_at_22.56.28_1_i470wt.jpg',
            'https://res.cloudinary.com/dhvqxlksv/image/upload/v1769295639/WhatsApp_Image_2026-01-24_at_22.56.28_xqzmej.jpg',
            'https://res.cloudinary.com/dhvqxlksv/image/upload/v1769295639/WhatsApp_Image_2026-01-24_at_22.56.27_k2p6c3.jpg',
            'https://res.cloudinary.com/dhvqxlksv/image/upload/v1769295639/WhatsApp_Image_2026-01-24_at_22.56.28_4_yclmnx.jpg',
            'https://res.cloudinary.com/dhvqxlksv/image/upload/v1769295639/WhatsApp_Image_2026-01-24_at_22.56.27_1_fjqa2k.jpg',
            'https://res.cloudinary.com/dhvqxlksv/image/upload/v1769295638/WhatsApp_Image_2026-01-24_at_22.56.28_6_xhdrnq.jpg',
            'https://res.cloudinary.com/dhvqxlksv/image/upload/v1769295638/WhatsApp_Image_2026-01-24_at_22.56.28_5_cz8tvr.jpg'
        ];

        const contentDiv = document.getElementById('content');
        const gardenDiv = document.getElementById('garden-container');
        const galleryWrapper = document.getElementById('gallery-wrapper');
        const colLeft = document.getElementById('col-left');
        const colRight = document.getElementById('col-right');
        const rowTop = document.getElementById('row-top');

        const tulipPath = `<path d="M25,50 C10,50 0,35 0,20 C0,5 10,0 25,10 C40,0 50,5 50,20 C50,35 40,50 25,50 Z M25,10 L25,35" />`;
        const flowerColors = ['fill-red', 'fill-pink', 'fill-purple', 'fill-yellow', 'fill-white'];

        function calculateAge(birthYear) { return today.getFullYear() - birthYear; }

        function setupGalleries() {
            let displayPhotos = [...photos, ...photos, ...photos, ...photos];
            colLeft.innerHTML = displayPhotos.map(url => `<img src="${url}" class="scroll-img">`).join('');
            colRight.innerHTML = displayPhotos.map(url => `<img src="${url}" class="scroll-img">`).join('');
            rowTop.innerHTML = displayPhotos.map(url => `<img src="${url}" class="scroll-img-h">`).join('');
        }

        function openGift() {
            const btn = document.querySelector('.gift-btn');
            if (btn) {
                btn.style.opacity = '0';
                setTimeout(() => btn.remove(), 500);
            }
            
            setupGalleries();
            galleryWrapper.classList.add('visible');
            
            const p = document.querySelector('.subtitle');
            if (p) p.innerText = "Some of our favorite memories... ❤";
        }

        function growGarden() {
            const isMobile = window.innerWidth < 800;
            const numberOfFlowers = isMobile ? 15 : 30;
            for (let i = 0; i < numberOfFlowers; i++) { createFlower(i); }
        }

        function createFlower(index) {
            const wrapper = document.createElement('div');
            wrapper.classList.add('flower-wrapper');
            const randomLeft = Math.floor(Math.random() * 90) + 5;
            wrapper.style.left = randomLeft + '%';
            const maxH = window.innerWidth < 800 ? 35 : 45;
            const randomHeight = Math.floor(Math.random() * 25) + 20;
            const randomAngle = (Math.random() * 30) - 15;
            wrapper.style.transform = `rotate(${randomAngle}deg)`;
            const growDuration = (Math.random() * 5) + 5;
            const bloomDelay = growDuration;
            const colorClass = flowerColors[Math.floor(Math.random() * flowerColors.length)];
            
            wrapper.innerHTML = `
                <svg class="flower-head ${colorClass}" viewBox="0 0 50 60" style="animation-duration: 2s; animation-delay: ${bloomDelay}s">
                    ${tulipPath}
                </svg>
                <div class="stem" style="height: ${randomHeight}vh; animation-duration: ${growDuration}s;"></div>
            `;
            gardenDiv.appendChild(wrapper);
        }

        function checkDate() {
            const currentMonth = today.getMonth();
            const currentDay = today.getDate();
            const birthMonth = birthDate.getMonth();
            const birthDay = birthDate.getDate();

            if (currentMonth === birthMonth && currentDay === birthDay) {
                renderBirthdayMode();
            } else {
                renderCountdownMode();
            }
        }

        function renderBirthdayMode() {
            const age = calculateAge(birthDate.getFullYear());
            contentDiv.innerHTML = `
                <h1>Happy ${age}th Birthday</h1>
                <p class="subtitle">To the most beautiful girl in the world.</p>
                <button class="gift-btn" onclick="openGift()">Click for a surprise 🎁</button>
            `;
            contentDiv.style.opacity = '0';
            growGarden();
            setTimeout(() => { contentDiv.style.opacity = '1'; }, 10000); 
        }

        function renderCountdownMode() {
            let nextBirthday = new Date(today.getFullYear(), birthDate.getMonth(), birthDate.getDate());
            if (today > nextBirthday) nextBirthday.setFullYear(today.getFullYear() + 1);
            
            const diffTime = Math.abs(nextBirthday - today);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const nextAge = nextBirthday.getFullYear() - birthDate.getFullYear();
            
            contentDiv.innerHTML = `
                <h1>Counting Down...</h1>
                <p>Only <span class="highlight">${diffDays} days</span> left until your <span class="highlight">${nextAge}th</span> birthday!</p>
            `;
            contentDiv.style.opacity = '1';
        }

        checkDate();
        window.openGift = openGift;
    </script>
</body>
</html>
